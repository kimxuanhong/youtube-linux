<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.2"/>
    </filter>
    <radialGradient id="grad" cx="35%" cy="35%">
      <stop offset="0%" stop-color="#FF3D3D"/>
      <stop offset="100%" stop-color="#CC0000"/>
    </radialGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect x="48" y="48" width="416" height="416" rx="96" fill="url(#grad)" filter="url(#shadow)"/>
  
  <!-- Glossy highlight -->
  <ellipse cx="160" cy="140" rx="120" ry="100" fill="white" opacity="0.2"/>
  
  <!-- Play triangle -->
  <polygon points="192,176 192,336 352,256" fill="white" filter="url(#shadow)"/>
</svg>
